<div class="modal_login" style="display: none;">
    <div class="box_login">
        <button class="btn_close" onclick="document.querySelector('.modal_login').style.display = 'none'">X</button>

        <h2>Login</h2>

        <form onsubmit="fazer_login(event)">
            <div class="input_group">
                <label for="username">Usuário:</label>
                <input type="text" id="username" required placeholder="Digite seu usuário">
            </div>

            <div class="input_group">
                <label for="password">Senha:</label>
                <input type="password" id="password" required placeholder="Digite sua senha">
            </div>

            <div id="mensagem"></div>

            <button type="submit" class="btn_enviar">Entrar</button>
        </form>
    </div>
</div>
